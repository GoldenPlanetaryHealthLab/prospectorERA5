# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - r@4.5.1
  - python@3.14
  - zstd
  - cmake
  - libxml2
  - git
  - curl
  - openssl
  - gmake
  - icu4c
  - libpng
  - abseil-cpp
  - libx11
  - libzmq
  - sqlite
  - udunits
  - r-udunits2
  view: true
  concretizer:
    unify: true
  container:
    format: singularity
